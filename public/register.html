<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 - 达人运营平台</title>
    <link rel="stylesheet" href="/styles.css?v=20260623-auth" />
  </head>
  <body class="auth-page">
    <main class="auth-card">
      <div class="brand auth-brand">
        <span class="brand-mark">D</span>
        <div>
          <strong>达人中台</strong>
          <small>Creator Ops</small>
        </div>
      </div>

      <h1>注册账号</h1>
      <p class="auth-description">注册需要邀请码，适合先给公司内部运营和商务使用。</p>

      <div id="auth-message" class="message" hidden></div>

      <form id="register-form" class="auth-form">
        <label>
          账号
          <input name="username" required autocomplete="username" placeholder="建议使用姓名拼音或邮箱前缀" />
        </label>
        <label>
          昵称
          <input name="display_name" maxlength="40" placeholder="例如：张运营" />
        </label>
        <label>
          密码
          <input name="password" type="password" required autocomplete="new-password" placeholder="至少 6 位" />
        </label>
        <label>
          邀请码
          <input name="invite_code" required placeholder="请输入管理员提供的邀请码" />
        </label>
        <button class="primary-button submit-button" type="submit">注册并登录</button>
      </form>

      <p class="auth-footer">
        已有账号？<a href="/login.html">返回登录</a>
      </p>
    </main>

    <script src="/auth.js?v=20260623-auth"></script>
  </body>
</html>
